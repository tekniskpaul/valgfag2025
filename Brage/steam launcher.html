<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brage Steam Launcher – Alphabetical</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0e141b;
    color: white;
}
.topbar {
    background: #171d25;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
}
.topbar h1 { font-size: 18px; margin: 0; }
.topbar a {
    text-decoration: none;
    color: white;
    background: #66c0f4;
    padding: 8px 16px;
    border-radius: 5px;
    font-size: 14px;
    transition: 0.2s;
}
.topbar a:hover { background: #559edc; }

.container { padding: 20px; }

input#search {
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    border: none;
    margin-bottom: 10px;
    font-size: 16px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, 150px);
    gap: 12px;
}
.game {
    background: #16202d;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    transition: 0.2s;
}
.game:hover {
    transform: scale(1.05);
    box-shadow: 0 0 10px #66c0f4;
}
.game img {
    width: 100%;
    height: 100px;
    object-fit: cover;
}
.game p { font-size: 12px; margin: 5px; }

.pagination {
    display: flex;
    justify-content: center;
    margin-top: 15px;
    gap: 5px;
    flex-wrap: wrap;
}
.pagination button {
    padding: 6px 12px;
    border: none;
    border-radius: 5px;
    background: #66c0f4;
    color: white;
    cursor: pointer;
    font-size: 14px;
}
.pagination button:hover { background: #559edc; }
.pagination button.active {
    background: #ffffff;
    color: #171d25;
}

.arrows {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
}
.arrows button {
    font-size: 18px;
    background: #66c0f4;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 5px;
    cursor: pointer;
    transition: 0.2s;
}
.arrows button:hover { background: #559edc; }
</style>
</head>
<body>

<div class="topbar">
    <h1>🎮 Brage Steam Launcher – Alphabetical</h1>
    <a href="index.html" target="_blank">← Back to Home</a>
</div>

<div class="container">
    <input type="text" id="search" placeholder="Search games...">
    <div class="arrows">
        <button id="prev">&larr; Previous</button>
        <button id="next">Next &rarr;</button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="pagination" id="pagination"></div>
</div>

<script>

const allGames = [

{ name:"WEBFISHING", appid:0 },
{ name:"Wallpaper Engine", appid:431960 }
];

// Sort alphabetically
allGames.sort((a,b)=>a.name.localeCompare(b.name));

// Alphabetical pages
const pages = {};
for(let i=0;i<26;i++){
    const letter=String.fromCharCode(65+i);
    pages[letter]=allGames.filter(g=>g.name.toUpperCase().startsWith(letter));
}
for(const l in pages){ if(pages[l].length===0) delete pages[l]; }

const letters=Object.keys(pages);
let currentPageIndex=0;

const grid=document.getElementById("grid");
const pagination=document.getElementById("pagination");
const searchInput=document.getElementById("search");

function getImage(appid){
    return appid ? "https://cdn.cloudflare.steamstatic.com/steam/apps/"+appid+"/header.jpg"
                 : "https://via.placeholder.com/150x100?text=No+Image";
}

function renderPage(index, filter=""){
    const letter=letters[index];
    let games=pages[letter];
    if(filter){
        const f=filter.toLowerCase();
        games=games.filter(g=>g.name.toLowerCase().includes(f));
    }
    grid.innerHTML="";
    games.forEach(g=>{
        const div=document.createElement("div");
        div.className="game";
        div.innerHTML=`<img src="${getImage(g.appid)}" alt="${g.name}" onerror="this.src='https://via.placeholder.com/150x100?text=No+Image'"><p>${g.name}</p>`;
        div.onclick=()=>{ if(g.appid) window.open("https://store.steampowered.com/app/"+g.appid+"/","_blank"); };
        grid.appendChild(div);
    });
    pagination.innerHTML="";
    letters.forEach((l,i)=>{
        const btn=document.createElement("button");
        btn.textContent=l;
        if(i===index) btn.classList.add("active");
        btn.onclick=()=>{ currentPageIndex=i; renderPage(i, searchInput.value); };
        pagination.appendChild(btn);
    });
}

// Arrow buttons
document.getElementById("prev").onclick=()=>{ currentPageIndex=(currentPageIndex-1+letters.length)%letters.length; renderPage(currentPageIndex, searchInput.value); };
document.getElementById("next").onclick=()=>{ currentPageIndex=(currentPageIndex+1)%letters.length; renderPage(currentPageIndex, searchInput.value); };

// Keyboard arrows
document.addEventListener("keydown",e=>{
    if(e.key==="ArrowLeft"){ currentPageIndex=(currentPageIndex-1+letters.length)%letters.length; renderPage(currentPageIndex, searchInput.value); }
    else if(e.key==="ArrowRight"){ currentPageIndex=(currentPageIndex+1)%letters.length; renderPage(currentPageIndex, searchInput.value); }
});

// Search input
searchInput.addEventListener("input",()=>{
    renderPage(currentPageIndex, searchInput.value);
});

// Initial render
renderPage(currentPageIndex);
</script>

</body>
</html>
